server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC
    username: root
    password: Doubiyan12
  redis:
    host: 127.0.0.1
    port: 6379
    password: Doubiyan12
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug
# 新增 RocketMQ 配置
rocketmq:
  name-server: 127.0.0.1:9876  # 刚才启动的 NameServer 地址
  producer:
    group: hmdp-producer-group # 生产者组名，名字随便起，但在整个系统里要唯一
    send-message-timeout: 3000 # 发送消息超时时间，单位毫秒
    retry-times-when-send-failed: 2 # 发送失败重试次数